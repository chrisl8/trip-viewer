<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="82" fill="#1a1a2e"/>

  <!-- Outer lens ring -->
  <circle cx="256" cy="256" r="205" fill="#16213e"/>

  <!-- Inner lens ring with blue stroke -->
  <circle cx="256" cy="256" r="170" fill="#0f3460" stroke="#2196F3" stroke-width="5"/>

  <!-- Dark center -->
  <circle cx="256" cy="256" r="128" fill="#1a1a2e"/>

  <!-- Road triangle -->
  <path d="M200 390 L256 170 L312 390 Z" fill="#37474F"/>

  <!-- Dashed center line -->
  <line x1="256" y1="170" x2="256" y2="390" stroke="#FFD54F" stroke-width="4" stroke-dasharray="14 10"/>

  <!-- Road bottom edge -->
  <line x1="200" y1="390" x2="312" y2="390" stroke="#546E7A" stroke-width="3"/>

  <!-- Recording indicator dot -->
  <circle cx="256" cy="170" r="10" fill="#FF5252" opacity="0.9"/>

  <!-- Outer subtle ring -->
  <circle cx="256" cy="256" r="205" fill="none" stroke="#2196F3" stroke-width="3" opacity="0.35"/>

  <!-- Crosshair tick marks -->
  <line x1="256" y1="51" x2="256" y2="32" stroke="#2196F3" stroke-width="2.5" opacity="0.3"/>
  <line x1="256" y1="461" x2="256" y2="480" stroke="#2196F3" stroke-width="2.5" opacity="0.3"/>
  <line x1="51" y1="256" x2="32" y2="256" stroke="#2196F3" stroke-width="2.5" opacity="0.3"/>
  <line x1="461" y1="256" x2="480" y2="256" stroke="#2196F3" stroke-width="2.5" opacity="0.3"/>
</svg>
