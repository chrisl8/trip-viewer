name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-15-intel    # Intel (x86_64) — macos-13 was retired 2025-12-08
            args: ''
          - platform: macos-latest      # Apple Silicon (aarch64)
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            file \
            gstreamer1.0-libav \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: 'Trip Viewer v__VERSION__'
          releaseBody: 'Download the `.exe` (Windows), `.AppImage` (Linux), or `.dmg` (macOS) below to install or update.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Verify updater artifact signature
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.platform }}" in
            windows-latest)
              curl -fsSL -o "$RUNNER_TEMP/minisign.zip" https://github.com/jedisct1/minisign/releases/download/0.11/minisign-0.11-win64.zip
              unzip -q "$RUNNER_TEMP/minisign.zip" -d "$RUNNER_TEMP"
              MINISIGN="$RUNNER_TEMP/minisign-win64/minisign.exe"
              ARTIFACT_GLOB="src-tauri/target/release/bundle/nsis/*_x64-setup.exe"
              ;;
            ubuntu-22.04)
              sudo apt install -y minisign
              MINISIGN=minisign
              ARTIFACT_GLOB="src-tauri/target/release/bundle/appimage/*_amd64.AppImage"
              ;;
            macos-15-intel|macos-latest)
              brew install minisign
              MINISIGN=minisign
              ARTIFACT_GLOB="src-tauri/target/release/bundle/macos/*.app.tar.gz"
              ;;
            *)
              echo "::warning::Unknown platform ${{ matrix.platform }}, skipping verify"
              exit 0
              ;;
          esac

          ARTIFACT=$(ls -1 $ARTIFACT_GLOB 2>/dev/null | head -n 1 || true)
          if [ -z "${ARTIFACT:-}" ] || [ ! -f "$ARTIFACT" ]; then
            echo "::warning::No artifact matched $ARTIFACT_GLOB — skipping verify"
            exit 0
          fi
          SIG="${ARTIFACT}.sig"
          if [ ! -f "$SIG" ]; then
            echo "::warning::No .sig next to $ARTIFACT — updater not enabled for this target"
            exit 0
          fi

          jq -r .plugins.updater.pubkey src-tauri/tauri.conf.json | base64 -d > "$RUNNER_TEMP/pk.txt"

          echo "Verifying $(basename "$ARTIFACT") against its .sig"
          wc -c "$SIG"
          head -n 1 "$SIG"
          "$MINISIGN" -Vm "$ARTIFACT" -x "$SIG" -p "$RUNNER_TEMP/pk.txt"
